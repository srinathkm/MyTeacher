<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Teacher | Student-Focused Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+Kannada:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --ivory: #FAF8F5; --slate: #1E293B; --indigo: #4F46E5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ivory); color: var(--slate); }
        .kannada { font-family: 'Noto Sans Kannada', sans-serif; font-size: 24px; }
        
        /* The "Subtle Shift" Styling */
        .word { transition: color 0.3s ease; color: #94a3b8; /* Slate-400 */ }
        .word.active { color: var(--indigo); font-weight: 700; }
        
        .enterprise-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; transition: all 0.3s ease; }
    </style>
</head>
<body class="antialiased pb-32">

    <nav class="p-8 flex justify-between items-center">
        <div class="font-bold tracking-tighter uppercase">My Teacher</div>
        <a href="https://myteachernew.fly.dev" class="text-indigo-600 font-semibold text-sm">Launch App</a>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-12">
        <header class="mb-16">
            <h1 class="text-4xl font-bold mb-4">Understand at your pace.</h1>
            <p class="text-slate-500">A conversational approach to vernacular mastery.</p>
        </header>

        <div class="enterprise-card p-10 shadow-sm">
            <div class="mb-8">
                <span class="text-xs font-bold text-indigo-600 uppercase tracking-widest">Current Lesson</span>
                <div id="lesson-container" class="kannada mt-4 leading-relaxed">
                    <span class="word" data-start="0.5">ಜ್ಞಾನವೇ</span> 
                    <span class="word" data-start="1.2">ಶಕ್ತಿ.</span>
                    <span class="word" data-start="2.0">ಓದುವುದಕ್ಕಿಂತ</span>
                    <span class="word" data-start="3.0">ತಿಳಿಯುವುದು</span>
                    <span class="word" data-start="4.0">ಮುಖ್ಯ.</span>
                </div>
            </div>

            <button onclick="startLesson()" class="flex items-center gap-3 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                <span>🎙️</span> Hear Teacher's Explanation
            </button>
        </div>
    </main>

    <div id="audio-overlay" class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-6 translate-y-full transition-transform duration-500 shadow-2xl z-50">
        <div class="max-w-4xl mx-auto flex items-center gap-6">
            <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">🔊</div>
            <div class="flex-1">
                <p class="text-xs font-bold text-indigo-600 uppercase">Conversational Mode</p>
                <p class="text-sm font-medium">Teacher-Student Interaction in Progress...</p>
                <div class="w-full bg-slate-100 h-1 mt-2 rounded-full overflow-hidden">
                    <div id="progress" class="bg-indigo-600 h-full w-0 transition-all"></div>
                </div>
            </div>
            <button onclick="stopLesson()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
    </div>

    <audio id="audio-engine" src="demo.mp3"></audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const overlay = document.getElementById('audio-overlay');
        const words = document.querySelectorAll('.word');
        const progress = document.getElementById('progress');

        function startLesson() {
            overlay.classList.remove('translate-y-full');
            audio.play();
        }

        function stopLesson() {
            overlay.classList.add('translate-y-full');
            audio.pause();
            audio.currentTime = 0;
        }

        audio.ontimeupdate = () => {
            const currentTime = audio.currentTime;
            
            // Update Progress Bar
            progress.style.width = (currentTime / audio.duration * 100) + "%";

            // Word-by-Word Highlight Logic
            words.forEach((word, index) => {
                const startTime = parseFloat(word.dataset.start);
                const nextWord = words[index + 1];
                const endTime = nextWord ? parseFloat(nextWord.dataset.start) : audio.duration;

                if (currentTime >= startTime && currentTime < endTime) {
                    word.classList.add('active');
                } else {
                    word.classList.remove('active');
                }
            });
        };
    </script>
</body>
</html>
