name: Fly Deploy
on:
  push:
    branches:
      - flyio-new-files

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # Add this environment variable here to fix the deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    concurrency: deploy-group
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # This will now run on Node 24

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
